<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tatra Flora Quiz</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);margin:0;padding:1rem}
    .spinner{border:3px solid #f3f4f6;border-top:3px solid #4f46e5;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const P=[{id:1,p:"Arcydzięgiel litwor",l:"Angelica archangelica",d:"Okazała roślina do 2,5m. Łodyga gruba. Liście 3-4-krotnie pierzaste. Kwiaty zielonkawo-żółte.",h:"Ziołorośla, piargi, brzegi potoków",b:"VII-VIII",a:"700-2600m",z:["regiel dolny","regiel górny","kosodrzewina","hale","turnie"],i:["https://upload.wikimedia.org/wikipedia/commons/0/0c/Tatry_%E2%80%93_Arcydzi%C4%99giel_litwor_%28Angelica_archangelica%29_nad_Morskim_Okem_01.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Angelica_archangelica_ssp._litoralis_-_Meriputki_C_IMG_5947.JPG/1280px-Angelica_archangelica_ssp._litoralis_-_Meriputki_C_IMG_5947.JPG"],c:["Roślina dwuletnia","Kwiaty zielonkawo-żółte","Liście ciemnozielone"]},{id:2,p:"Aster alpejski",l:"Aster alpinus",d:"Bylina 10-20cm. Kwiaty fioletowe z żółtym środkiem. Rośnie na skalnych półkach.",h:"Murawy, podłoże wapienne",b:"VII-VIII",a:"700-2600m",z:["regiel dolny","regiel górny","kosodrzewina"],i:["https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg/1280px-Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg","https://upload.wikimedia.org/wikipedia/commons/b/be/Aster-alpinus.JPG"],c:["Bylina z kłączem","Kwiaty fioletowe","Roślina wapieniolubna"]}];
let C=null,U="",S=false,O=0,A=0,M="quiz",L=null;
React.useEffect(()=>{C=P[0];},[]);
const k=()=>{if(!C||!U)return;A++;if(U.toLowerCase().trim()===C.p.toLowerCase().trim())O++;S=true;};
const N=()=>{C=P[Math.floor(Math.random()*P.length)];U="";S=false;L=null;};
const G=(p)=>p?.i?.length?p.i[Math.floor(Math.random()*p.i.length)]:null;
if(!C)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"></div></div>;
if(M==='study')return<div style={{padding:'1rem'}}><div style={{maxWidth:'56rem',margin:'0 auto'}}><header style={{marginBottom:'2rem'}}><h1 style={{fontSize:'1.5rem',fontWeight:'700'}}>📚 Przewodnik</h1><button onClick={()=>M='quiz'} style={{marginTop:'1rem',padding:'0.75rem',background:'#4f46e5',color:'white',borderRadius:'0.5rem'}}>Wróć</button></header><div style={{display:'grid',gap:'1rem'}}>{P.map(p=><div key={p.id} onClick={()=>L=p} style={{background:'white',borderRadius:'0.5rem',padding:'1rem',cursor:'pointer'}}><h3>{p.p}</h3><p style={{fontSize:'0.875rem',color:'#666'}}>{p.l}</p></div>)}</div>{L&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}><div style={{background:'white',borderRadius:'1rem',padding:'1.5rem',maxWidth:'42rem'}}><h2>{L.p}</h2><p style={{fontStyle:'italic'}}>{L.l}</p><img src={G(L)} style={{width:'100%',margin:'1rem 0'}}/><p>{L.d}</p><button onClick={()=>L=null}>Zamknij</button></div></div>}</div></div>;
return<div style={{padding:'1rem'}}><div style={{maxWidth:'56rem',margin:'0 auto'}}><header style={{display:'flex',justifyContent:'space-between',marginBottom:'2rem'}}><div><h1>🌿 Quiz Tatr</h1><p>{O}/{A}</p></div></header><div style={{background:'white',borderRadius:'1rem',padding:'1rem',marginBottom:'1rem'}}>{!S?<> <img src={G(C)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><input type="text" value={U} onChange={e=>U=e.target.value} placeholder="Nazwa polska..." style={{width:'100%',padding:'0.75rem',border:'1px solid #ddd',borderRadius:'0.5rem',margin:'1rem 0'}}/><div style={{display:'flex',gap:'1rem'}}><button onClick={k} style={{flex:1,padding:'0.75rem',background:'#4f46e5',color:'white',borderRadius:'0.5rem'}}>Sprawdź</button><button onClick={()=>M='study'} style={{flex:1,padding:'0.75rem',background:'#f3f4f6'}}>Przewodnik</button></div></div></>:<> <img src={G(C)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><h2 style={{color:U.toLowerCase().trim()===C.p.toLowerCase().trim()?'#10b981':'#ef4444'}}>{C.p}</h2><p style={{fontStyle:'italic'}}>{C.l}</p><p>{C.d}</p><button onClick={N} style={{width:'100%',padding:'0.75rem',background:'#4f46e5',color:'white',borderRadius:'0.5rem'}}>Następna</button></div></>}</div><footer style={{textAlign:'center',color:'#666',fontSize:'0.75rem'}}>Quiz flora Tatr - {P.length} rośliny</footer></div></div>;
  </script>
</body>
</html>
