// Test 1: Verify all plant images exist and are accessible
async function testImageLoading() {
  const test = {
    name: "Ładowanie obrazków",
    description: "Weryfikuje, że wszystkie obrazy roślin są dostępne i nie są puste",
    status: "running",
    steps: [],
    passed: 0,
    failed: 0
  };

  test.steps.push({ message: "Sprawdzanie obrazków...", status: "running" });
  
  for (const plant of plants) {
    for (const imgPath of plant.i) {
      const step = {
        message: `Sprawdzanie: ${imgPath}`,
        status: "running"
      };
      test.steps.push(step);
      
      try {
        // Create image element and check if it loads
        const img = new Image();
        img.src = imgPath;
        
        // Wait for image to load or error
        await new Promise((resolve, reject) => {
          img.onload = () => {
            if (img.width > 0 && img.height > 0) {
              step.status = "passed";
              step.message += ` ✅ (${img.width}x${img.height})`;
              test.passed++;
              resolve();
            } else {
              step.status = "failed";
              step.message += ` ❌ (pusty lub nieprawidłowy)`;
              test.failed++;
              resolve();
            }
          };
          img.onerror = () => {
            step.status = "failed";
            step.message += ` ❌ (błąd ładowania)`;
            test.failed++;
            resolve();
          };
          
          // Timeout after 2 seconds
          setTimeout(() => {
            step.status = "failed";
            step.message += ` ❌ (timeout)`;
            test.failed++;
            reject(new Error('Timeout'));
          }, 2000);
        });
      } catch (error) {
        // Already handled in the promise
      }
    }
  }

  test.status = test.failed === 0 ? "passed" : "failed";
  test.steps[0].status = test.status;
  return test;
}

// Test 3: Verify Polish characters are not corrupted
async function testPolishCharacters() {
  const test = {
    name: "Polskie znaki",
    description: "Weryfikuje, że polskie znaki (ą, ć, ę, ł, ń, ó, ś, ź, ż) nie są zepsute",
    status: "running",
    steps: [],
    passed: 0,
    failed: 0
  };

  const polishChars = ['ą', 'ć', 'ę', 'ł', 'ń', 'ó', 'ś', 'ź', 'ż', 'Ą', 'Ć', 'Ę', 'Ł', 'Ń', 'Ó', 'Ś', 'Ź', 'Ż'];
  
  test.steps.push({ message: "Sprawdzanie polskich znaków w nazwach roślin...", status: "running" });
  
  for (const plant of plants) {
    const name = plant.n;
    const hasPolishChars = polishChars.some(char => name.includes(char));
    
    if (hasPolishChars) {
      // Check if the name is properly encoded
      try {
        // Try to encode and decode
        const encoded = encodeURIComponent(name);
        const decoded = decodeURIComponent(encoded);
        
        if (decoded === name) {
          test.steps.push({
            message: `✅ ${name}`,
            status: "passed"
          });
          test.passed++;
        } else {
          test.steps.push({
            message: `❌ ${name} (zepsute kodowanie)`,
            status: "failed"
          });
          test.failed++;
        }
      } catch (error) {
        test.steps.push({
          message: `❌ ${name} (błąd: ${error.message})`,
          status: "failed"
        });
        test.failed++;
      }
    }
  }

  test.steps[0].status = test.failed === 0 ? "passed" : "failed";
  test.status = test.failed === 0 ? "passed" : "failed";
  return test;
}

    passed: 0,

    if (filename.startsWith('images/')) {
      return filename;
    }
    console.warn('Non-local image path detected:', filename);
    return 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%22200%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-family=%22Arial%22 font-size=%2214%22%3ENo image%3C/text%3E%3C/svg%3E';
  }

  test.steps.push({ message: "Testowanie lokalnych ścieżek...", status: "running" });
  
  // Test local images
  const localPaths = [
    'images/arcydziegiel_litwor_1.jpg',
    'images/szafran_spiski_1.jpg',

      test.steps.push({
        message: `❌ ${path} -> ${result} (nieoczekiwany wynik)`,

// Test 6: Verify all plants have required fields

  test.steps.push({ message: "Sprawdzanie pól roślin...", status: "running" });
  
  for (const plant of plants) {
    const missingFields = requiredFields.filter(field => !(field in plant));
    
    if (missingFields.length === 0) {
      test.steps.push({
        message: `✅ ${plant.n} (wszystkie pola obecne)`,
        status: "passed"

    } else {
      test.steps.push({
        message: `❌ ${plant.n} (brakujące: ${missingFields.join(', ')})`,
        status: "failed"
      });
      test.failed++;
    }
  }

  test.steps[0].status = test.failed === 0 ? "passed" : "failed";
  test.status = test.failed === 0 ? "passed" : "failed";
  return test;
}

  const validExtensions = ['.jpg', '.jpeg', '.png'];
  
  test.steps.push({ message: "Sprawdzanie rozszerzeń...", status: "running" });

    testPlantData,
    testPolishCharacters,
    testGetWikiUrl,

    testImageLoading
  ];
  
  // Run tests sequentially
  for (const testFn of allTests) {
    const test = await testFn();
    testResults.push(test);
    renderTest(test);
  }
  
  // Show summary
  showSummary();
}

// Render a single test
function renderTest(test) {
  const testsContainer = document.getElementById('tests-container');
  
  const testDiv = document.createElement('div');
  testDiv.className = 'test-container';
  
  const statusClass = test.status === 'passed' ? 'passed' : 
                     test.status === 'failed' ? 'failed' : 'running';
  
  testDiv.innerHTML = `
    <div class="test-header">
      <h2 class="test-title">${test.name}</h2>
      <span class="test-status ${statusClass}">${test.status === 'passed' ? '✅ Zaliczony' : test.status === 'failed' ? '❌ Niezaliczony' : '⏳ Trwa...'}</span>
    </div>
    <p>${test.description}</p>
    <ul class="test-steps">
      ${test.steps.map(step => `
        <li class="test-step ${step.status}">${step.message}</li>
      `).join('')}
    </ul>
    <div class="test-result">
      <strong>Wynik:</strong> ${test.passed} zaliczone, ${test.failed} niezaliczone
    </div>
  `;
  
  testsContainer.appendChild(testDiv);
}

// Show summary
function showSummary() {
  const summaryDiv = document.getElementById('summary');
  const total = testResults.length;
  const passed = testResults.filter(t => t.status === 'passed').length;
  const failed = testResults.filter(t => t.status === 'failed').length;
  
  document.getElementById('total-count').textContent = total;
  document.getElementById('passed-count').textContent = passed;
  document.getElementById('failed-count').textContent = failed;
  
  summaryDiv.style.display = 'block';
  
  // Scroll to summary
  summaryDiv.scrollIntoView({ behavior: 'smooth' });
}

// Auto-run tests on page load (optional)

</script>
