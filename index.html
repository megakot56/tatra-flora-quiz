<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tatra Flora Quiz</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:0;background:#f0f9ff;min-height:100vh;display:flex;flex-direction:column;overflow-y:auto}
.container{flex:1;max-width:56rem;margin:0 auto;width:100%;padding:1rem;box-sizing:border-box;display:flex;flex-direction:column;overflow-y:auto}
.card{background:#fff;border-radius:0.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);margin-bottom:1rem;overflow:hidden;flex:1;display:flex;flex-direction:column}
.card-image-container{height:200px;display:flex;align-items:center;justify-content:center;background:#f8f9fa;border-radius:0.5rem;flex-shrink:0}
.card-content{padding:1rem;flex:1;display:flex;flex-direction:column}
.card img{width:100%;max-height:100%;object-fit:contain}
.btn{padding:0.75rem 1.5rem;border-radius:0.5rem;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:#4f46e5;color:#fff}
.btn-secondary{background:#f3f4f6;color:#374151}
.correct{background:#d1fae5;color:#065f46;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
.wrong{background:#fee2e2;color:#991b1b;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:100}
.modal-content{background:#fff;border-radius:1rem;padding:1.5rem;max-width:42rem;width:100%;max-height:90vh;overflow-y:auto}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin:1rem 0}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.5rem;margin:1rem 0}
.gallery img{width:100%;height:100px;object-fit:cover;border-radius:0.25rem}

/* Mobile keyboard support - iPhone specific */
@media (max-width: 768px) {
  body{padding-bottom: env(safe-area-inset-bottom, 0)}
  .container{padding:0.5rem;min-height: calc(100vh - env(safe-area-inset-bottom, 0))}
  .card-image-container{height:180px}
  .card-content{padding:0.75rem}
  #answer-input{padding:0.875rem;font-size:1rem}
  .btn{padding:0.625rem 1.25rem;font-size:0.875rem}
}

/* iPhone 13 Pro specific (390px width) */
@media (max-width: 400px) and (max-height: 900px) {
  .card-image-container{height:160px}
  .container{padding:0.5rem 0.25rem}
  #answer-input{padding:1rem;font-size:1.125rem}
}

/* Focus state for input */
#answer-input:focus{
  outline: 2px solid #4f46e5;
  outline-offset: 1px;
}

/* Prevent zoom on input focus */
input[type="text"]{
  font-size: 16px !important;
}
</style>
</head>
<body>
<div id="app" style="flex:1;display:flex;flex-direction:column">
  <div class="container" id="main-container">
    <header style="display:flex;justify-content:space-between;margin-bottom:1rem;flex-shrink:0">
      <div>
        <h1 style="font-size:1.5rem">🌿 Quiz: Flora Tatr</h1>
        <p id="score" style="font-size:1rem">0/0</p>
      </div>
    </header>
    <div class="card" id="quiz-card" style="flex:1">
      <div class="card-image-container">
        <img id="plant-image" src="" style="max-width:100%;max-height:100%;object-fit:contain" />
      </div>
      <div class="card-content">
        <h2 id="question">Jaka to roślina?</h2>
        <input type="text" id="answer-input" placeholder="Wpisz nazwę polską..." style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:0.5rem;margin:0.5rem 0" onkeypress="if(event.key==='Enter') checkAnswer()" />
        <div style="display:flex;gap:1rem;margin-top:0.5rem">
          <button onclick="checkAnswer()" class="btn btn-primary">Sprawdź</button>
          <button onclick="showStudy()" class="btn btn-secondary">Przewodnik</button>
        </div>
      </div>
    </div>
    <div id="study-mode" style="display:none;flex:1">
      <header style="margin-bottom:2rem;flex-shrink:0">
        <h1 style="font-size:1.5rem;font-weight:700">📚 Przewodnik po florze Tatr</h1>
        <button onclick="showQuiz()" class="btn btn-primary">Wróć do quizu</button>
      </header>
      <div id="plants-grid" style="display:grid;gap:1rem;flex:1;overflow-y:auto"></div>
    </div>
  </div>
  <div id="plant-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <p id="modal-latin" style="font-style:italic"></p>
      <div class="gallery" id="modal-gallery"></div>
      <p id="modal-description"></p>
      <div class="grid2">
        <div><h4>Siedlisko:</h4><p id="modal-habitat"></p></div>
        <div><h4>Okres:</h4><p id="modal-bloom"></p></div>
        <div><h4>Występowanie:</h4><p id="modal-altitude"></p></div>
        <div><h4>Strefy:</h4><p id="modal-zones"></p></div>
      </div>
      <h4>Cechy:</h4>
      <ul id="modal-characteristics" style="list-style-type:disc;list-style-position:inside"></ul>
      <button onclick="closeModal()" class="btn btn-primary">Zamknij</button>
    </div>
  </div>
</div>

<script>
// Function to get working Wikimedia Commons URL
function getWikiUrl(filename) {
  return `https://upload.wikimedia.org/wikipedia/commons/${filename}`;
}

const plants = [
  {
    id: 1,
    n: "Arcydzięgiel litwor",
    l: "Angelica archangelica",
    d: "Okazała roślina dorastająca do 2,5 m wysokości. Łodyga gruba, naga, bruzdowana. Liście duże, 3-4-krotnie pierzaste. Kwiaty zebrane w duże, kuliste baldachy złocone, zielonkawo-żółte. Rośnie w miejscach wilgotnych, na brzegach potoków, w ziołoroślach wysokogórskich.",
    h: "Ziołorośla, utrwalone piargi, brzegi potoków",
    b: "VII-VIII",
    a: "700-2600m",
    z: ["regiel dolny", "regiel górny", "kosodrzewina", "hale", "turnie"],
    i: [
      "a/af/Angelica_archangelica_flower.JPG",
      "3/31/Angelica_archangelica_002.JPG",
      "d/dc/Angelica_archangelica_-_Jardin_des_Plantes_de_Paris.JPG",
      "8/82/Angelica_archangelica_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-158.jpg"
    ],
    c: ["Roślina dwuletnia i bylina", "Kwiaty zielonkawo-żółte", "Liście ciemnozielone", "Łodyga bruzdowana"]
  },
  {
    id: 2,
    n: "Aster alpejski",
    l: "Aster alpinus",
    d: "Bylina o wzniesionym, kępiastym pokroju, osiągająca 10-20 cm wysokości. Liście odziomkowe łopatkowe, liście łodygowe lancetowate. Kwiaty języczkowe fioletowe, rurkowate żółte, zebrane w koszyczki. Rośnie na skalnych półkach, w szczelinach skał, na żwirku wapiennym.",
    h: "Murawy, na podłożu zasobnym w węglan wapnia",
    b: "VII-VIII",
    a: "700-2600m",
    z: ["regiel dolny", "regiel górny", "kosodrzewina", "hale", "turnie"],
    i: [
      "b/be/Aster-alpinus.JPG",
      "f/f7/Aster_alpinus_001.JPG",
      "5/5a/Aster_alpinus_2007-06-22.jpg",
      "8/87/Aster_alpinus_%27Dunkle_Sch%C3%B6ne%27_flower_03.jpg"
    ],
    c: ["Bylina z grubym, rozgałęzionym kłączem", "Kwiaty fioletowe z żółtym środkiem", "Roślina wapieniolubna", "Niska, kępkowa"]
  },
  {
    id: 3,
    n: "Szafran spiski",
    l: "Crocus scepusiensis",
    d: "Niska roślina cebulowa osiągająca 5-15 cm wysokości. Liście wąskie, trawiaste, wyrastające bezpośrednio z cebuli. Kwiaty pojedyncze, fioletowe z białymi paskami, z żółtym gardłem, pojawiają się wczesną wiosną. Rośnie na trawiastych zboczach, w murawach i na skalistych terenach. Gatunek endemiczny dla Tatr Zachodnich.",
    h: "Murawy, trawiaste zbocza, tereny skaliste",
    b: "III-IV",
    a: "800-2000m",
    z: ["regiel dolny", "regiel górny", "kosodrzewina"],
    i: [
      "c/c7/Chocho%C5%82owska_Valley_-_Crocus_scepusiensis_-_Tatra_Mountains_01.jpg",
      "c/c7/Chocho%C5%82owska_Valley_-_Crocus_scepusiensis_-_Tatra_Mountains_02.jpg",
      "c/c7/Chocho%C5%82owska_Valley_-_Crocus_scepusiensis_-_Tatra_Mountains_03.jpg",
      "c/c7/Chocho%C5%82owska_Valley_-_Crocus_scepusiensis_-_Tatra_Mountains_04.jpg"
    ],
    c: ["Roślina cebulowa", "Kwiaty fioletowe z białymi paskami", "Wczesnowiosenny", "Gatunek endemiczny Tatr Zachodnich"]
  },
  {
    id: 4,
    n: "Obuwik pospolity",
    l: "Cypripedium calceolus",
    d: "Bylina z rodziny storczykowatych, osiągająca 20-60 cm wysokości. Charakterystyczne kwiaty w kształcie pantofelka, żółte z brązowymi żyłkami. Liście szerokoeliptyczne, owłosione. Rośnie w cienistych lasach, na wilgotnych glebach wapiennych. Jedna z najpiękniejszych i najrzadszych roślin tatrzańskich.",
    h: "Cieniste lasy liściaste i mieszane, wilgotne gleby wapienne",
    b: "V-VI",
    a: "500-1800m",
    z: ["regiel dolny", "regiel górny"],
    i: [
      "0/07/Cypripedium_calceolus_03-09.jpg",
      "2/26/Cypripedium_calceolus_TK_2021-05-29_2.jpg",
      "f/f0/Cypripedium_calceolus_-_Steiermark.jpg",
      "9/9f/1971._Calceolus_speciosum.jpg"
    ],
    c: ["Kwiat w kształcie pantofelka", "Roślina chroniona", "Wapieniolubna", "Siedlisko cieniste i wilgotne"]
  }
];

let currentPlant = null;
let score = 0;
let attempts = 0;

// Mobile keyboard handling
function adjustLayoutForKeyboard() {
  const container = document.getElementById('main-container');
  const input = document.getElementById('answer-input');
  const quizCard = document.getElementById('quiz-card');
  
  // On mobile, when input is focused, ensure it's visible
  input.addEventListener('focus', function() {
    setTimeout(() => {
      // Scroll the card to the top of the viewport
      quizCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      
      // For iOS, add extra padding when keyboard is open
      if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        container.style.paddingBottom = '200px';
      }
    }, 100);
  });
  
  input.addEventListener('blur', function() {
    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      container.style.paddingBottom = '';
    }
  });
}

function showQuiz() {
  document.getElementById('quiz-card').style.display = 'flex';
  document.getElementById('study-mode').style.display = 'none';
  nextPlant();
  adjustLayoutForKeyboard();
}

function showStudy() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('study-mode').style.display = 'flex';
  renderPlantsGrid();
}

function nextPlant() {
  currentPlant = plants[Math.floor(Math.random() * plants.length)];
  // Randomly select one of the plant's images
  const randomImageIndex = Math.floor(Math.random() * currentPlant.i.length);
  const imgUrl = getWikiUrl(currentPlant.i[randomImageIndex]);
  document.getElementById('plant-image').src = imgUrl;
  document.getElementById('answer-input').value = '';
  document.getElementById('question').textContent = 'Jaka to roślina?';
  document.getElementById('score').textContent = score + '/' + attempts;
  document.getElementById('answer-input').style.display = 'block';
  document.getElementById('answer-input').focus();
}

function checkAnswer() {
  const userAnswer = document.getElementById('answer-input').value.trim();
  if (!currentPlant || !userAnswer) return;

  attempts++;
  document.getElementById('score').textContent = score + '/' + attempts;

  if (userAnswer.toLowerCase() === currentPlant.n.toLowerCase()) {
    score++;
    document.getElementById('question').innerHTML = '<span class="correct">✓ Poprawna odpowiedź!</span> ' + currentPlant.n;
  } else {
    document.getElementById('question').innerHTML = '<span class="wrong">✗ Spróbuj ponownie</span> ' + currentPlant.n;
  }

  document.getElementById('answer-input').style.display = 'none';

  // Show plant details in modal after checking answer
  setTimeout(() => {
    showPlantDetails(currentPlant);
  }, 500);
}

function renderPlantsGrid() {
  const grid = document.getElementById('plants-grid');
  grid.innerHTML = '';
  plants.forEach(plant => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showPlantDetails(plant);
    const imgUrl = getWikiUrl(plant.i[0]);
    card.innerHTML = `
      <div class="card-image-container" style="height:140px">
        <img src="${imgUrl}" alt="${plant.n}" style="max-width:100%;max-height:100%;object-fit:contain" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22200%22%3E%3Crect fill=%22%23ddd%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3EImage not available%3C/text%3E%3C/svg%3E'">
      </div>
      <div class="card-content">
        <h3>${plant.n}</h3>
        <p style="font-size:0.875rem;color:#666">${plant.l}</p>
        <p style="font-size:0.875rem;color:#2563eb;margin-top:0.5rem">Kliknij, aby zobaczyć więcej</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

function showPlantDetails(plant) {
  document.getElementById('modal-title').textContent = plant.n;
  document.getElementById('modal-latin').textContent = plant.l;
  document.getElementById('modal-description').textContent = plant.d;
  document.getElementById('modal-habitat').textContent = plant.h;
  document.getElementById('modal-bloom').textContent = plant.b;
  document.getElementById('modal-altitude').textContent = plant.a;
  document.getElementById('modal-zones').textContent = plant.z.join(', ');
  
  // Render gallery with all plant images
  const gallery = document.getElementById('modal-gallery');
  gallery.innerHTML = '';
  plant.i.forEach(imgPath => {
    const img = document.createElement('img');
    const imgUrl = getWikiUrl(imgPath);
    img.src = imgUrl;
    img.alt = plant.n;
    img.onerror = function() {
      this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2212%22%3ENo img%3C/text%3E%3C/svg%3E';
    };
    gallery.appendChild(img);
  });
  
  const charList = document.getElementById('modal-characteristics');
  charList.innerHTML = '';
  plant.c.forEach(char => {
    const li = document.createElement('li');
    li.textContent = char;
    charList.appendChild(li);
  });
  document.getElementById('plant-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('plant-modal').style.display = 'none';
  // Continue to next plant after closing modal
  setTimeout(() => {
    nextPlant();
  }, 300);
}

// Initialize
showQuiz();

// Handle window resize
window.addEventListener('resize', function() {
  const container = document.getElementById('main-container');
  if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    if (window.innerHeight < 600) {
      container.style.paddingBottom = '150px';
    } else {
      container.style.paddingBottom = '';
    }
  }
});

// Handle keyboard visibility changes (iOS)
window.visualViewport?.addEventListener('resize', function() {
  const container = document.getElementById('main-container');
  if (window.visualViewport.height < window.innerHeight * 0.7) {
    // Keyboard is open
    container.style.paddingBottom = '150px';
    const input = document.getElementById('answer-input');
    if (input && document.activeElement === input) {
      setTimeout(() => {
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  } else {
    container.style.paddingBottom = '';
  }
});
</script>
</body>
</html>
