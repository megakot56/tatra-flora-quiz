<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tatra Flora Quiz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:1rem;background:#f0f9ff}
.sp{border:3px solid #e5e7eb;border-top:3px solid #4f46e5;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#fff;border-radius:0.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);margin-bottom:1rem;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.card>div{padding:1rem}
.btn{padding:0.75rem 1.5rem;border-radius:0.5rem;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:#4f46e5;color:#fff}
.btn-secondary{background:#f3f4f6;color:#374151}
.correct{background:#d1fae5;color:#065f46;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
.wrong{background:#fee2e2;color:#991b1b;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const plants = [
{id:1,n:"Arcydzięgiel litwor",l:"Angelica archangelica",d:"Okazała roślina do 2,5m. Łodyga gruba, bruzdowana. Liście 3-4-krotnie pierzaste. Kwiaty zielonkawo-żółte. Rośnie w miejscach wilgotnych, na brzegach potoków.",h:"Ziołorośla, piargi, brzegi potoków",b:"VII-VIII",a:"700-2600m",z:["regiel dolny","regiel górny","kosodrzewina","hale","turnie"],i:["https://upload.wikimedia.org/wikipedia/commons/0/0c/Tatry_%E2%80%93_Arcydzi%C4%99giel_litwor_%28Angelica_archangelica%29_nad_Morskim_Okem_01.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Angelica_archangelica_ssp._litoralis_-_Meriputki_C_IMG_5947.JPG/1280px-Angelica_archangelica_ssp._litoralis_-_Meriputki_C_IMG_5947.JPG"],c:["Roślina dwuletnia","Kwiaty zielonkawo-żółte","Liście ciemnozielone"]},
{id:2,n:"Aster alpejski",l:"Aster alpinus",d:"Bylina 10-20cm. Kwiaty fioletowe z żółtym środkiem. Rośnie na skalnych półkach, w szczelinach skał.",h:"Murawy, podłoże wapienne",b:"VII-VIII",a:"700-2600m",z:["regiel dolny","regiel górny","kosodrzewina"],i:["https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg/1280px-Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg","https://upload.wikimedia.org/wikipedia/commons/b/be/Aster-alpinus.JPG"],c:["Bylina z kłączem","Kwiaty fioletowe","Roślina wapieniolubna"]}
];
function App(){
const[c,sc]=React.useState(null);const[u,su]=React.useState('');const[s,ss]=React.useState(false);const[sc2,ss2]=React.useState(0);const[a,sa]=React.useState(0);const[m,sm]=React.useState('quiz');const[sl,ssl]=React.useState(null);
React.useEffect(()=>{if(plants.length>0)sc(plants[0]);},[]);
const ch=()=>{if(!c||!u)return;sa(a+1);if(u.toLowerCase().trim()===c.n.toLowerCase().trim())ss2(sc2+1);ss(true);};
const ne=()=>{sc(plants[Math.floor(Math.random()*plants.length)]);su('');ss(false);ssl(null);};
const gi=(p)=>p?.i?.[0]||'https://via.placeholder.com/400x300?text=No+Image';
if(!c)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="sp"></div></div>;
if(m==='study')return<div style={{padding:'1rem'}}><div style={{maxWidth:'56rem',margin:'0 auto'}}><header style={{marginBottom:'2rem'}}><h1 style={{fontSize:'1.5rem',fontWeight:'700'}}>📚 Przewodnik</h1><button onClick={()=>sm('quiz')} className="btn btn-primary">Wróć do quizu</button></header><div style={{display:'grid',gap:'1rem'}}>{plants.map(p=><div key={p.id} onClick={()=>ssl(p)} className="card"><img src={gi(p)} alt={p.n}/><div><h3>{p.n}</h3><p style={{fontSize:'0.875rem',color:'#666'}}>{p.l}</p><p style={{fontSize:'0.875rem',color:'#2563eb',marginTop:'0.5rem'}}>Kliknij</p></div></div>)}</div>{sl&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}><div style={{background:'white',borderRadius:'1rem',padding:'1.5rem',maxWidth:'42rem',width:'100%'}}><h2>{sl.n}</h2><p style={{fontStyle:'italic'}}>{sl.l}</p><img src={gi(sl)} style={{width:'100%',margin:'1rem 0',borderRadius:'0.5rem'}}/><p>{sl.d}</p><div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1rem',margin:'1rem 0'}}><div><h4>Siedlisko:</h4><p>{sl.h}</p></div><div><h4>Okres:</h4><p>{sl.b}</p></div><div><h4>Występowanie:</h4><p>{sl.a}</p></div><div><h4>Strefy:</h4><p>{sl.z.join(', ')}</p></div></div><h4>Cechy:</h4><ul style={{listStyleType:'disc',listStylePosition:'inside'}}>{sl.c.map((ch,i)=><li key={i}>{ch}</li>)}</ul><button onClick={()=>ssl(null)} className="btn btn-primary">Zamknij</button></div></div>}</div></div>;
return<div style={{padding:'1rem'}}><div style={{maxWidth:'56rem',margin:'0 auto'}}><header style={{display:'flex',justifyContent:'space-between',marginBottom:'2rem'}}><div><h1>🌿 Quiz Tatr</h1><p>{sc2}/{a}</p></div></header><div className="card">{!s?<> <img src={gi(c)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><input type="text" value={u} onChange={e=>su(e.target.value)} placeholder="Nazwa polska..." style={{width:'100%',padding:'0.75rem',border:'1px solid #ddd',borderRadius:'0.5rem',margin:'1rem 0'}}/><div style={{display:'flex',gap:'1rem'}}><button onClick={ch} className="btn btn-primary">Sprawdź</button><button onClick={()=>sm('study')} className="btn btn-secondary">Przewodnik</button></div></div></>:<> <img src={gi(c)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><div style={{display:'flex',alignItems:'center',marginBottom:'1rem'}}><h2 className={u.toLowerCase().trim()===c.n.toLowerCase().trim()?'correct':'wrong'}>{c.n}</h2></div><p style={{fontStyle:'italic'}}>{c.l}</p><p>{c.d}</p><div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1rem',margin:'1rem 0'}}><div><h4>Siedlisko:</h4><p>{c.h}</p></div><div><h4>Okres:</h4><p>{c.b}</p></div><div><h4>Występowanie:</h4><p>{c.a}</p></div><div><h4>Strefy:</h4><p>{c.z.join(', ')}</p></div></div><button onClick={ne} className="btn btn-primary">Następna →</button></div></>}</div><footer style={{textAlign:'center',color:'#666',fontSize:'0.75rem',marginTop:'2rem'}}>Quiz flora Tatr - {plants.length} rośliny</footer></div></div>;
}
const root = ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
</script>
</body>
</html>
