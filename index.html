<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tatra Flora Quiz</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:0;background:#f0f9ff;min-height:100vh;display:flex;flex-direction:column}
.container{flex:1;max-width:56rem;margin:0 auto;width:100%;padding:1rem;box-sizing:border-box}
.card{background:#fff;border-radius:0.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);margin-bottom:1rem;overflow:hidden}
.card img{width:100%;max-height:400px;object-fit:contain;background:#f8f9fa}
.card>div{padding:1rem}
.btn{padding:0.75rem 1.5rem;border-radius:0.5rem;border:none;cursor:pointer;font-weight:500}
.btn-primary{background:#4f46e5;color:#fff}
.btn-secondary{background:#f3f4f6;color:#374151}
.correct{background:#d1fae5;color:#065f46;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
.wrong{background:#fee2e2;color:#991b1b;padding:0.25rem 0.5rem;border-radius:9999px;font-size:0.75rem}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:100}
.modal-content{background:#fff;border-radius:1rem;padding:1.5rem;max-width:42rem;width:100%;max-height:90vh;overflow-y:auto}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin:1rem 0}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0.75rem;margin:1rem 0}
.gallery img{width:100%;height:150px;object-fit:cover;border-radius:0.25rem}

/* Desktop and iPad - larger images */
@media (min-width: 769px) {
  .card img{max-height:600px}
  .gallery img{height:180px}
  .gallery{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
}

/* Plants grid - multi-column layout for study mode */
#plants-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  width: 100%;
}

/* Responsive adjustments for plants grid */
@media (min-width: 1200px) {
  #plants-grid {
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
}
@media (max-width: 768px) {
  #plants-grid {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
}
@media (max-width: 480px) {
  #plants-grid {
    grid-template-columns: 1fr;
  }
}

/* Mobile adjustments */
@media (max-width: 768px) {
  .container{padding:0.5rem}
  .card img{max-height:300px}
  .modal-content{max-width:95vw;padding:1rem}
  #answer-input{padding:0.875rem;font-size:1rem}
  body{padding-bottom: env(safe-area-inset-bottom, 0)}
}

/* iPhone specific */
@media (max-width: 400px) {
  .card img{max-height:250px}
  .container{padding:0.5rem 0.25rem}
}

/* Focus state */
#answer-input:focus{
  outline: 2px solid #4f46e5;
  outline-offset: 1px;
}

/* Prevent zoom on mobile */
input[type="text"]{
  font-size: 16px !important;
}
</style>
</head>
<body>
<div id="app" style="flex:1;display:flex;flex-direction:column">
  <div class="container" id="main-container">
    <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
      <h1 style="margin:0">f33f Quiz: Flora Tatr</h1>
      <span id="score" style="font-size:1.25rem;font-weight:500">0/0</span>
    </header>
    <div class="card" id="quiz-card">
      <img id="plant-image" src="" style="width:100%;max-height:600px;object-fit:contain;background:#f8f9fa;border-radius:0.5rem" />
      <div style="padding:1rem">
        <h2 id="question">Jaka to roblina?</h2>
        <input type="text" id="answer-input" placeholder="Wpisz nazw9 polsk5..." style="width:50%;padding:0.75rem;border:1px solid #ddd;border-radius:0.5rem;margin:1rem 0" onkeypress="if(event.key==='Enter') checkAnswer()" />
        <div style="display:flex;gap:1rem">
          <button onclick="checkAnswer()" class="btn btn-primary">Sprawd</button>
          <button onclick="showStudy()" class="btn btn-secondary">Przewodnik</button>
        </div>
      </div>
    </div>
    <div id="study-mode" style="display:none">
      <header style="margin-bottom:2rem">
        <h1 style="font-size:1.5rem;font-weight:700">f4da Przewodnik po florze Tatr</h1>
        <button onclick="showQuiz()" class="btn btn-primary">Wr3 do quizu</button>
      </header>
      <div id="plants-grid"></div>
    </div>
  </div>
  <div id="plant-modal" class="modal" style="display:none" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2 id="modal-title"></h2>
      <p id="modal-latin" style="font-style:italic"></p>
      <div class="gallery" id="modal-gallery"></div>
      <p id="modal-description"></p>
      <div class="grid2">
        <div><h4>Siedlisko:</h4><p id="modal-habitat"></p></div>
        <div><h4>Okres:</h4><p id="modal-bloom"></p></div>
        <div><h4>Wystpowanie:</h4><p id="modal-altitude"></p></div>
        <div><h4>Strefy:</h4><p id="modal-zones"></p></div>
      </div>
      <h4>Cechy:</h4>
      <ul id="modal-characteristics" style="list-style-type:disc;list-style-position:inside"></ul>
      <button onclick="closeModal()" class="btn btn-primary">Zamknij</button>
    </div>
  </div>
</div>

<script>

}

    h: "Zio2orobla, utrwalone piargi, brzegi potok3w",
    b: "VII-VIII",
    a: "700-2600m",
    z: ["regiel dolny", "regiel g3rny", "kosodrzewina", "hale", "turnie"],
    i: [
      "a/af/Angelica_archangelica_flower.JPG",
      "3/31/Angelica_archangelica_002.JPG",
      "d/dc/Angelica_archangelica_-_Jardin_des_Plantes_de_Paris.JPG",
      "8/82/Angelica_archangelica_-_K%C3%B3hler%E2%80%93s_Medizinal-Pflanzen-158.jpg"
    ],
    c: ["Roblina dwuletnia i bylina", "Kwiaty zielonkawo-te", "Libcie ciemnozielone", "01odyga bruzdowana"]
  },
  {

    n: "Aster alpejski",
    l: "Aster alpinus",
    d: "Bylina o wzniesionym, k9piastym pokroju, osi5gaj5ca 10-20 cm wysokobci. Libcie odziomkowe 2opatkowe, libcie 2odygowe lancetowate. Kwiaty j9zyczkowe fioletowe, rurkowate te, zebrane w koszyczki. Robnie na skalnych p35kach, w szczelinach ska2, na wirku wapiennym.",
    h: "Murawy, na pod2ocu zasobnym w w9glan wapnia",
    b: "VII-VIII",
    a: "700-2600m",
    z: ["regiel dolny", "regiel g3rny", "kosodrzewina", "hale", "turnie"],
    i: [
      "b/be/Aster-alpinus.JPG",
      "f/f7/Aster_alpinus_001.JPG",
      "5/5a/Aster_alpinus_2007-06-22.jpg",
      "8/87/Aster_alpinus_%27Dunkle_Sch%C3%B6ne%27_flower_03.jpg"
    ],
    c: ["Bylina z grubym, rozga29zionym k25czem", "Kwiaty fioletowe z tym brodkiem", "Roblina wapieniolubna", "Niska, k9pkowa"]

      "0/07/Cypripedium_calceolus_03-09.jpg",

  {

    z: ["kosodrzewina", "hale", "turnie"],
    i: [
      "5/5e/Carlina_acaulis_001.jpg",
      "9/9a/Carlina_acaulis_Blatt.jpg",

    c: ["Rozeta liciowa u nasady", "Libcie kolczasto z5bate, bia2o ow2osione od spodu", "Kwiatostan koszyczkowy z bia2ymi kwiatami", "Roblina wapieniolubna", "01odyga kwiatowa skr2cona"]
  }
];

let currentPlant = null;
let score = 0;
let attempts = 0;

// Mobile keyboard handling
function adjustLayoutForKeyboard() {
  const container = document.getElementById('main-container');
  const input = document.getElementById('answer-input');
  
  if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    input.addEventListener('focus', function() {
      setTimeout(() => {
        container.style.paddingBottom = '200px';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 100);
    });
    
    input.addEventListener('blur', function() {
      container.style.paddingBottom = '';
    });
  }
}

function showQuiz() {
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('study-mode').style.display = 'none';
  nextPlant();
  adjustLayoutForKeyboard();
}

function showStudy() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('study-mode').style.display = 'block';
  renderPlantsGrid();
}

function nextPlant() {
  currentPlant = plants[Math.floor(Math.random() * plants.length)];
  // Randomly select one of the plant's images
  const randomImageIndex = Math.floor(Math.random() * currentPlant.i.length);
  const imgUrl = getWikiUrl(currentPlant.i[randomImageIndex]);
  document.getElementById('plant-image').src = imgUrl;
  document.getElementById('answer-input').value = '';
  document.getElementById('question').textContent = 'Jaka to roblina?';
  document.getElementById('score').textContent = score + '/' + attempts;
  document.getElementById('answer-input').style.display = 'block';
  document.getElementById('answer-input').focus();
}

function checkAnswer() {
  const userAnswer = document.getElementById('answer-input').value.trim();
  if (!currentPlant || !userAnswer) return;

  attempts++;
  document.getElementById('score').textContent = score + '/' + attempts;

  if (userAnswer.toLowerCase() === currentPlant.n.toLowerCase()) {
    score++;
    document.getElementById('question').innerHTML = '<span class="correct">\u2713 Poprawna odpowied\u017a!</span> ' + currentPlant.n;
  } else {
    document.getElementById('question').innerHTML = '<span class="wrong">\u2717 Spr\u00f3buj ponownie</span> ' + currentPlant.n;
  }

  document.getElementById('answer-input').style.display = 'none';

  // Show plant details in modal after checking answer
  setTimeout(() => {
    showPlantDetails(currentPlant);
  }, 500);
}

function renderPlantsGrid() {
  const grid = document.getElementById('plants-grid');
  grid.innerHTML = '';
  plants.forEach(plant => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showPlantDetails(plant);
    const imgUrl = getWikiUrl(plant.i[0]);
    card.innerHTML = `
      <img src="${imgUrl}" alt="${plant.n}" style="width:100%;max-height:400px;object-fit:contain;background:#f8f9fa" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22200%22%3E%3Crect fill=%22%23ddd%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3EImage not available%3C/text%3E%3C/svg%3E'">
      <div>
        <h3>${plant.n}</h3>
        <p style="font-size:0.875rem;color:#666">${plant.l}</p>
        <p style="font-size:0.875rem;color:#2563eb;margin-top:0.5rem">Kliknij, aby zobaczy\u0107 wi\u0119cej</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

function showPlantDetails(plant) {
  document.getElementById('modal-title').textContent = plant.n;
  document.getElementById('modal-latin').textContent = plant.l;
  document.getElementById('modal-description').textContent = plant.d;
  document.getElementById('modal-habitat').textContent = plant.h;
  document.getElementById('modal-bloom').textContent = plant.b;
  document.getElementById('modal-altitude').textContent = plant.a;
  document.getElementById('modal-zones').textContent = plant.z.join(', ');
  
  // Render gallery with all plant images
  const gallery = document.getElementById('modal-gallery');
  gallery.innerHTML = '';
  plant.i.forEach(imgPath => {
    const img = document.createElement('img');
    const imgUrl = getWikiUrl(imgPath);
    img.src = imgUrl;
    img.alt = plant.n;
    img.onerror = function() {
      this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2212%22%3ENo img%3C/text%3E%3C/svg%3E';
    };
    gallery.appendChild(img);
  });
  
  const charList = document.getElementById('modal-characteristics');
  charList.innerHTML = '';
  plant.c.forEach(char => {
    const li = document.createElement('li');
    li.textContent = char;
    charList.appendChild(li);
  });
  document.getElementById('plant-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('plant-modal').style.display = 'none';
  // Continue to next plant after closing modal
  setTimeout(() => {
    nextPlant();
  }, 300);
}

// Initialize
showQuiz();

// Handle keyboard visibility changes (iOS)
window.visualViewport?.addEventListener('resize', function() {
  const container = document.getElementById('main-container');
  if (window.visualViewport.height < window.innerHeight * 0.7) {
    container.style.paddingBottom = '150px';
  } else {
    container.style.paddingBottom = '';
  }
});
</script>
</body>
</html>
