<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tatra Quiz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:1rem;background:#f0f9ff}.sp{border:3px solid #e5e7eb;border-top:3px solid #4f46e5;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const P=[{id:1,p:"Arcydzięgiel litwor",l:"Angelica archangelica",d:"Okazała roślina do 2,5m. Kwiaty zielonkawo-żółte.",i:["https://upload.wikimedia.org/wikipedia/commons/0/0c/Tatry_%E2%80%93_Arcydzi%C4%99giel_litwor_%28Angelica_archangelica%29_nad_Morskim_Okem_01.jpg"]},{id:2,p:"Aster alpejski",l:"Aster alpinus",d:"Bylina 10-20cm. Kwiaty fioletowe.",i:["https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg/1280px-Aster_alpinus_Aster_alpejski_2019-05-17_03.jpg"]}];
let C=null,U="",S=false,O=0,A=0;
React.useEffect(()=>{C=P[0];},[]);
const k=()=>{if(!C||!U)return;A++;if(U.toLowerCase().trim()===C.p.toLowerCase().trim())O++;S=true;};
const N=()=>{C=P[Math.floor(Math.random()*P.length)];U="";S=false;};
const G=(p)=>p?.i?.[0]||"https://via.placeholder.com/400x300?text=No+Image";
if(!C)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="sp"></div></div>;
return<div style={{padding:'1rem'}}><div style={{maxWidth:'500px',margin:'0 auto'}}><header style={{marginBottom:'1rem'}}><h1>🌿 Quiz Tatr</h1><p>{O}/{A}</p></header><div style={{background:'white',borderRadius:'1rem',padding:'1rem',marginBottom:'1rem'}}>{!S?<> <img src={G(C)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><input type="text" value={U} onChange={e=>U=e.target.value} placeholder="Nazwa polska..." style={{width:'100%',padding:'0.75rem',border:'1px solid #ddd',borderRadius:'0.5rem',margin:'1rem 0'}}/><button onClick={k} style={{width:'100%',padding:'0.75rem',background:'#4f46e5',color:'white',borderRadius:'0.5rem'}}>Sprawdź</button></div></>:<> <img src={G(C)} style={{width:'100%',height:'300px',objectFit:'cover',borderRadius:'0.5rem'}}/><div style={{padding:'1rem'}}><h2 style={{color:U.toLowerCase().trim()===C.p.toLowerCase().trim()?'#10b981':'#ef4444'}}>{C.p}</h2><p>{C.l}</p><p>{C.d}</p><button onClick={N} style={{width:'100%',padding:'0.75rem',background:'#4f46e5',color:'white',borderRadius:'0.5rem'}}>Następna</button></div></>}</div></div>;
</script>
</body>
</html>
