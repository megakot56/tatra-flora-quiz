    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
}
@media (max-width: 768px) {

@media (max-width: 480px) {

let currentPlant = null;
let score = 0;
let attempts = 0;
let selectedOption = null;

// Function to get image URL - ONLY local images supported
function getWikiUrl(filename) {
  // Only local images are supported (in images/ folder)
  // This ensures we don't have issues with external sources
  if (filename.startsWith('images/')) {
    return filename;
  }
  
  // Fallback: if somehow a non-local path is used, return placeholder
  console.warn('Non-local image path detected:', filename);
  return 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%22200%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-family=%22Arial%22 font-size=%2214%22%3ENo image%3C/text%3E%3C/svg%3E';
}

function toggleAnswerOptions() {
  const checkbox = document.getElementById('not-member-checkbox');
  const optionsContainer = document.getElementById('answer-options-container');
  const textInput = document.getElementById('answer-input');
  
  if (checkbox.checked) {
    optionsContainer.style.display = 'block';
    textInput.style.display = 'none';
    generateAnswerOptions();
  } else {
    optionsContainer.style.display = 'none';
    textInput.style.display = 'block';
    selectedOption = null;
    updateAnswerOptions();
  }
}

function generateAnswerOptions() {
  if (!currentPlant) return;
  
  const optionsContainer = document.getElementById('answer-options');
  optionsContainer.innerHTML = '';
  
  const relatedPlants = relatedPlantsMap[currentPlant.n] || [];
  const wrongAnswers = [];
  const allPlants = plants.filter(p => p.n !== currentPlant.n);
  
  for (const relatedName of relatedPlants) {
    const relatedPlant = allPlants.find(p => p.n === relatedName);
    if (relatedPlant && wrongAnswers.length < 3) {
      wrongAnswers.push(relatedPlant.n);
    }
  }
  
  while (wrongAnswers.length < 3 && allPlants.length > 0) {
    const randomPlant = allPlants[Math.floor(Math.random() * allPlants.length)];
    if (!wrongAnswers.includes(randomPlant.n)) {
      wrongAnswers.push(randomPlant.n);
    }
  }
  
  const allOptions = [currentPlant.n, ...wrongAnswers];
  const shuffledOptions = shuffleArray(allOptions);
  
  shuffledOptions.forEach((option, index) => {
    const optionElement = document.createElement('div');
    optionElement.className = 'answer-option';
    optionElement.textContent = option;
    optionElement.onclick = () => selectAnswerOption(option, optionElement);
    optionsContainer.appendChild(optionElement);
  });
}

function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

function selectAnswerOption(option, element) {
  const allOptions = document.querySelectorAll('.answer-option');
  allOptions.forEach(opt => {
    opt.classList.remove('selected');
  });
  element.classList.add('selected');
  selectedOption = option;
  
  // Auto-check: od razu sprawd odpowied po wyborze
  const checkbox = document.getElementById('not-member-checkbox');
  if (checkbox.checked) {
    checkAnswer();
  }
}

function updateAnswerOptions() {
  if (!currentPlant) return;
  
  const options = document.querySelectorAll('.answer-option');
  options.forEach(opt => {
    if (opt.textContent === currentPlant.n) {
      opt.classList.add('correct-answer');
      opt.classList.remove('wrong-answer', 'selected');
    } else {
      opt.classList.add('wrong-answer');
      opt.classList.remove('correct-answer', 'selected');
    }
  });
}

// Mobile keyboard handling
function adjustLayoutForKeyboard() {
  const container = document.getElementById('main-container');
  const input = document.getElementById('answer-input');
  
  if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    input.addEventListener('focus', function() {
      setTimeout(() => {
        container.style.paddingBottom = '200px';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 100);
    });
    
    input.addEventListener('blur', function() {
      container.style.paddingBottom = '';
    });
  }
}

function showQuiz() {
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('study-mode').style.display = 'none';
  nextPlant();
  adjustLayoutForKeyboard();
}

function showStudy() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('study-mode').style.display = 'block';
  renderPlantsGrid();
}

function nextPlant() {
  currentPlant = plants[Math.floor(Math.random() * plants.length)];
  // Randomly select one of the plant's images
  const randomImageIndex = Math.floor(Math.random() * currentPlant.i.length);
  const imgUrl = getWikiUrl(currentPlant.i[randomImageIndex]);
  document.getElementById('plant-image').src = imgUrl;
  document.getElementById('answer-input').value = '';
  document.getElementById('question').textContent = 'Jaka to roblina?';
  document.getElementById('score').textContent = score + '/' + attempts;
  document.getElementById('answer-input').style.display = 'block';
  document.getElementById('not-member-checkbox').checked = false;
  document.getElementById('answer-options-container').style.display = 'none';
  selectedOption = null;
  document.getElementById('answer-result').style.display = 'none';
  document.getElementById('answer-input').focus();
}

function checkAnswer() {
  const checkbox = document.getElementById('not-member-checkbox');
  const userAnswer = document.getElementById('answer-input').value.trim();
  
  if (!currentPlant) return;

  attempts++;
  document.getElementById('score').textContent = score + '/' + attempts;

  let isCorrect = false;
  
  if (checkbox.checked) {
    if (selectedOption === currentPlant.n) {
      isCorrect = true;
      score++;
      document.getElementById('question').innerHTML = '<span class="correct">2713 Poprawna odpowied!</span> ' + currentPlant.n;
      updateAnswerOptions();
    } else if (selectedOption) {
      document.getElementById('question').innerHTML = '<span class="wrong">2717 Spr2buj ponownie</span> ' + currentPlant.n;
      updateAnswerOptions();
    } else {
      document.getElementById('question').innerHTML = '<span class="wrong">2717 Wybierz odpowied</span> ' + currentPlant.n;
      return;
    }
  } else {
    if (!userAnswer) return;
    
    if (userAnswer.toLowerCase() === currentPlant.n.toLowerCase()) {
      isCorrect = true;
      score++;
      document.getElementById('question').innerHTML = '<span class="correct">2713 Poprawna odpowied!</span> ' + currentPlant.n;
    } else {
      document.getElementById('question').innerHTML = '<span class="wrong">2717 Spr2buj ponownie</span> ' + currentPlant.n;
    }
  }

  if (checkbox.checked) {
    const allOptions = document.querySelectorAll('.answer-option');
    allOptions.forEach(opt => {
      opt.style.cursor = 'not-allowed';
      opt.onclick = null;
    });
  } else {
    document.getElementById('answer-input').style.display = 'none';
  }

  // Show plant details in modal after checking answer
  setTimeout(() => {
    showPlantDetails(currentPlant, isCorrect);
  }, 500);
}

function renderPlantsGrid() {
  const grid = document.getElementById('plants-grid');
  grid.innerHTML = '';
  plants.forEach(plant => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showPlantDetails(plant);
    const imgUrl = getWikiUrl(plant.i[0]);
    card.innerHTML = `
      <img src="${imgUrl}" alt="${plant.n}" style="width:100%;max-height:400px;object-fit:contain;background:#f8f9fa" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22400%22 height=%22200%22/%3E%3Ctext x=%22200%22 y=%22100%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22 font-family=%22Arial%22 font-size=%2214%22%3ENo image%3C/text%3E%3C/svg%3E'"; this.style.background='%23f8f9fa'">
      <div>
        <h3>${plant.n}</h3>
        <p style="font-size:0.875rem;color:#666">${plant.l}</p>
        <p style="font-size:0.875rem;color:#2563eb;margin-top:0.5rem">Kliknij, aby zobaczy7 wicej</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

function showPlantDetails(plant, isCorrect = null) {
  document.getElementById('modal-title').textContent = plant.n;
  document.getElementById('modal-latin').textContent = plant.l;
  
  // Poka informacj o poprawnobci odpowiedzi
  const resultDiv = document.getElementById('answer-result-modal');
  if (resultDiv) {
    if (isCorrect === true) {
      resultDiv.innerHTML = '<span class="correct">2713 Poprawna odpowied!</span>';
      resultDiv.style.display = 'block';
    } else if (isCorrect === false) {
      resultDiv.innerHTML = '<span class="wrong">2717 Spr2buj ponownie</span>';
      resultDiv.style.display = 'block';
    } else {
      resultDiv.style.display = 'none';
    }
  }
  document.getElementById('modal-description').textContent = plant.d;
  document.getElementById('modal-habitat').textContent = plant.h;
  document.getElementById('modal-bloom').textContent = plant.b;
  document.getElementById('modal-altitude').textContent = plant.a;
  document.getElementById('modal-zones').textContent = plant.z.join(', ');
  document.getElementById('modal-limestone').textContent = plant.pL ? 'Woli pod2oce wapienne' : 'Spotykana g22wnie na granicie i wapieniu';
  
  // Render gallery with all plant images
  const gallery = document.getElementById('modal-gallery');
  gallery.innerHTML = '';
  plant.i.forEach(imgPath => {
    const img = document.createElement('img');
    const imgUrl = getWikiUrl(imgPath);
    img.src = imgUrl;
    img.alt = plant.n;
    img.onerror = function() {
      this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2212%22%3ENo img%3C/text%3E%3C/svg%3E';
    };
    gallery.appendChild(img);
  });
  
  const charList = document.getElementById('modal-characteristics');
  charList.innerHTML = '';
  plant.c.forEach(char => {
    const li = document.createElement('li');
    li.textContent = char;
    charList.appendChild(li);
  });
  document.getElementById('plant-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('plant-modal').style.display = 'none';
  document.getElementById('answer-result-modal').style.display = 'none';
  // Continue to next plant after closing modal
  setTimeout(() => {
    nextPlant();
  }, 300);
}
